---

#
# Definitions for Krokiet docker container.
#
# This file is used as data source to generate README.md and unRAID template files
# from Jinja2 templates.
#

app:
  id: 37
  name: krokiet
  friendly_name: Krokiet
  gui_type: x11
  base_os: alpine
  project:
    description: |-
      Krokiet is the new generation GUI frontend for Cakawka, written in Rust,
      simple, fast and easy to use app to remove unnecessary files from your
      computer.
    url: https://github.com/qarmin/czkawka
  unraid:
    #support_url: https://forums.unraid.net/topic/XXXXXX-support-krokiet/
    category: "Tools:"
  documentation:
    sections:
      - title: Trash Directory
        level: 2
        content: |-
         When trash usage is enabled in {{ app.friendly_name }} settings, deleted files are
         moved to the trash directory located at `/config/xdg/data/Trash` inside the
         container.

         > [!NOTE]
         > Using the trash may be slower than permanent deletion, especially for large
         > files, because the operation involves copying the file to the trash directory
         > before removing the original.
  changelog:
    - version: 26.07.2
      date: 2026-07-13
      changes:
        - 'Updated baseimage to version 4.12.6, bringing the following changes:'
        - '2:Fixed regression causing container startup failure when the container engine automatically mounts files under `/run`.'
        - '2:Read-only filesystem support now requires exposing `/run` as a tmpfs.'
    - version: 26.07.1
      date: 2026-07-08
      changes:
        - 'Updated Krokiet to version 12.0.0.'
        - 'Updated baseimage to version 4.12.5, bringing the following changes:'
        - '2:Added the ability to run the container with read-only filesystem.'
        - '2:Added the ability to configure the shell used by the web terminal.'
        - '2:Enabled window shadows to improve support of GTK4 applications.'
        - '2:Switched to fastcompmgr as the X compositor.'
        - '2:Updated TigerVNC to version 1.16.2.'
        - '2:Updated noVNC to version 1.7.0.'
        - '2:Improved web authentication compatibility with reverse proxies by using relative redirects.'
        - '2:Force usage of the local X display to avoid connecting to the host X server in Docker host network mode.'
    - version: 26.03.1
      date: 2026-03-14
      changes:
        - 'Updated baseimage to version 4.11.3, bringing the following changes:'
        - '2:Enable xcompmgr output only when debug is enabled.'
        - '2:Enhanced self-signed certificates by including the Subject Alternative Name (SAN) and using the container hostname instead of a dummy domain name.'
    - version: 26.02.2
      date: 2026-02-22
      changes:
        - 'Updated Krokiet to version 11.0.1.'
        - 'Updated baseimage to version 4.11.2, bringing the following changes:'
        - '2:Fixed issue where taking ownership of directory would fail.'
        - '2:Fixed X server failing to find the appropriate Mesa driver on some setups.'
    - version: 26.02.1
      date: 2026-02-17
      changes:
        - 'Initial release.'

container:
  storage_permissions: rw

  # Environment variables.
  environment_variables: []

  # Volumes
  volumes: []

  # Network ports
  ports: []

  # Devices
  devices: []
